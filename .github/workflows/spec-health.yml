        #     filter contract (sub-90 + chunked_path=false ONLY) so a future
        #     refactor cannot silently drop the warning that tells contributors
        #     "this NO-OP finding is from a stale pre-chunked-walker cache".
        # Per H1 workflow-step-parity rule these are broader-contract tests
        # (not single-footer-gate locks), so they get a dedicated step. All
        # three exit fast (~8s combined) and run without LOVABLE_API_KEY.
        run: |
          bash linter-scripts/test/test-audit-ai-implementability.sh
          bash linter-scripts/test/test-audit-bundle-budget.sh
          bash linter-scripts/test/test-audit-chunked-cache-advisory.sh
      - name: Trace-map regression gate
        # Runs generate-trace-map.py and compares against the committed baseline at
        # .lovable/memory/audit/trace-map-baseline.json. Fails the build if AC
        # coverage drops, drift grows, orphan code grows, or trace-map.toml
        # references a missing AC / file. Spec: spec/27-spec-toolchain/15-check-trace-map-regression.md
        run: python3 linter-scripts/check-trace-map-regression.py

      - name: AI-implementability deep-walk audit (Phase 153 Task A12, strict on BLOCKING)
        # Phase 153 Task A12 (graduated from A5 advisory): `audit-ai-implementability.py`
        # (slot 34, shipped by Task A4) now runs `--strict`. Exits 1 if any module
        # scores BLOCKING (<60); GOOD/NEEDS_WORK still pass (advisory inside the
        # report). Per H1 workflow-step-parity lesson this is a *broader-contract*
        # step (LLM 5-dimension rubric vs the deterministic single-gate self-tests),
        # so it gets its own workflow step rather than collapsing into a numbered
        # footer gate. Skipped on forks / when LOVABLE_API_KEY is unset to avoid
        # noisy 401 failures on community PRs. Cache lives at
        # .lovable/cache/audit-ai/ and is repo-local — re-runs are cheap.
        # Baseline: 84.7/100 (GOOD) at Task A8 v5 closure 2026-04-30; 5 EXCELLENT,
        # 18 GOOD, 0 NEEDS_WORK, 0 BLOCKING — graduation criteria met per H10
        # filter (mechanically detectable + active regression surface + low
        # false-positive risk: BLOCKING<60 is a wide moat from current 75-floor).
        # 4 modules sit at the structural 75-floor (03/12/17/25 — Rubric v6
        # ceiling per Lesson #29/#36/#37); Rubric v7 (A15-A20) is the proper
        # tool to lift those, NOT lowering the strict threshold.
        # Spec: spec/27-spec-toolchain/34-audit-ai-implementability.md
        if: env.LOVABLE_API_KEY != ''
        env:
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 linter-scripts/audit-ai-implementability.py --strict

      - name: §24 design-system boundary gate (Sess-55 A-43, gate #19)
        # Promotes §24 §97 AC-ADS-06 / 09 / 10 from contract-proven to load-proven.
        # Hard-fails CI when:
        #   - any pages/(marketing)/** file imports src/components/app/AppShell
        #   - any basename appears in BOTH src/components/ui/** and src/components/app/**
        #   - any var(--app-status-*) leaks into src/components/ui/**
        # Self-test asserts each negative fixture under linter-scripts/fixtures/
        # is rejected (vacuously-passing scanner is itself a fail).
        run: |
          python3 linter-scripts/check-ads-boundaries.py --check all
          python3 linter-scripts/check-ads-boundaries.py --self-test

      - name: Summary
        if: always()
        env:
          AUDIT_DETERMINISTIC: '1'
        run: |
          echo "## Spec Cross-Link Result" >> "$GITHUB_STEP_SUMMARY"
          python3 linter-scripts/check-spec-cross-links.py --json 2>&1 | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{d[\"count\"]} broken link(s)' if d['count'] else '✅ All cross-links resolve.')" >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Spec Tree Health Result (strict)" >> "$GITHUB_STEP_SUMMARY"
          node linter-scripts/check-tree-health.cjs --strict --report 2>&1 | head -10 >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Lockstep Gate Result" >> "$GITHUB_STEP_SUMMARY"
          node linter-scripts/check-lockstep.cjs 2>&1 | tail -8 >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## AI-Implementability Audit v2" >> "$GITHUB_STEP_SUMMARY"
          python3 linter-scripts/audit-spec-vs-code-v2.py 2>&1 | tail -3 >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Trace-map Regression Result" >> "$GITHUB_STEP_SUMMARY"
          python3 linter-scripts/check-trace-map-regression.py --report-only 2>&1 | tail -10 >> "$GITHUB_STEP_SUMMARY" || true
