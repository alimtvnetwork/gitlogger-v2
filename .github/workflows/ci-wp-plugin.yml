name: CI - WP plugin

on:
  push:
    branches: [main]
    paths:
      - 'git-logs-plugin/**'
      - '.github/workflows/ci-wp-plugin.yml'
  pull_request:
    paths:
      - 'git-logs-plugin/**'
      - '.github/workflows/ci-wp-plugin.yml'

permissions:
  contents: read

jobs:
  test:
    name: PHP unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium, json, mbstring, pdo_sqlite
          coverage: none
      - name: Run plugin test suite (auth + REST)
        run: php git-logs-plugin/tests/run.php
      - name: Run plugin DB-layer test suite
        run: php git-logs-plugin/tests/run-db.php

  lint:
    name: PHP syntax lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: php -l
        run: |
          set -e
          find git-logs-plugin -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l > /dev/null
