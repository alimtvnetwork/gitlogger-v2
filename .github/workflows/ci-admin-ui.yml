name: CI - Admin UI E2E

on:
  push:
    branches: [main]
    paths:
      - 'git-logs-plugin/admin-ui/**'
      - '.github/workflows/ci-admin-ui.yml'
  pull_request:
    paths:
      - 'git-logs-plugin/admin-ui/**'
      - '.github/workflows/ci-admin-ui.yml'

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Official Playwright image ships every browser dep (glib/nss/etc.)
    # already linked, which the bare GitHub runner does not.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    defaults:
      run:
        working-directory: git-logs-plugin/admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install JS deps
        run: bun install --frozen-lockfile
      - name: Type-check
        run: bun x tsc --noEmit -p .
      - name: Build production bundle
        run: bun run build
      - name: Run Playwright suite
        run: bun x playwright test
        env:
          CI: '1'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: git-logs-plugin/admin-ui/playwright-report/
          retention-days: 7
