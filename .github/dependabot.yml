version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/glci"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/git-logs-plugin/admin-ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      admin-ui-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
