# GoReleaser config for glci.
#
# Local dry-run:    goreleaser release --snapshot --clean
# Tagged release:   git tag v1.0.0 && git push --tags  (CI runs goreleaser/goreleaser-action)
#
# Output: cross-platform binaries + checksums + manifest hint for self-update.

version: 2

project_name: glci

builds:
  - id: glci
    main: ./glci
    binary: glci
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: glci
    name_template: "glci_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

release:
  github:
    owner: example
    name: glci
  draft: false
  prerelease: auto
