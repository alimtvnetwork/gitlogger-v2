run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - bodyclose

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true
  goimports:
    local-prefixes: github.com/example/glci

issues:
  exclude-dirs:
    - scripts
  max-issues-per-linter: 0
  max-same-issues: 0
